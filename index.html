<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaDream</title>
    <style>
        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            background-color: #ffffff; /* Page background */
            color: #000000;
            min-height: 200vh; /* Extra height so you can test scrolling over dark areas */
        }

        /* ==========================================
           AUTOMATIC COLOR-CHANGING NAVBAR
           ========================================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 1000;
            
            /* 1. Background Blur Layer */
            background-color: rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);

            /* 2. Magic Color Detector Rule */
            /* This forces everything inside the header to invert its color based on the background */
            mix-blend-mode: difference; 
        }

        .nav-container {
            max-width: 1200px;
            height: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
        }

        /* Base configuration for the text and logo must start as white 
           so 'difference' can accurately flip them to black over light backgrounds */
        .nav-logo {
            height: 32px;
            width: auto;
            display: block;
            /* Inverts your default black logo image to white initially */
            filter: invert(1); 
        }

        /* ==========================================
           DROPDOWN MENU STYLE
           ========================================== */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #ffffff; /* Starts white, auto-flips to black over light zones */
            font-family: inherit;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
        }

        .arrow {
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 160px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 4px;
        }

        .dropdown-content a {
            color: #333333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
        }

        /* Hover Actions */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .arrow {
            transform: rotate(180deg);
        }

        /* ==========================================
           HERO SECTION WITH BACKGROUND IMAGE
           ========================================== */
        .hero-section {
            position: relative;
            width: 100%;
            height: 70vh; 
            margin-top: 60px; 
            background-image: url('images/hero-bg.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-overlay-text h1 {
            font-size: clamp(48px, 10vw, 120px); 
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); 
            user-select: none;
        }

        /* ==========================================
           DARK CONTENT SECTION (To test color switching)
           ========================================== */
        .dark-section {
            background-color: #0d0e12; /* Dark section */
            padding: 100px 24px;
            text-align: center;
            min-height: 60vh;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo-link">
                <img src="images/wordmarkblack.png" alt="BetaDream Logo" class="nav-logo">
            </a>
            <nav>
                <div class="dropdown">
                    <button class="dropbtn">Home <span class="arrow">▼</span></button>
                    <div class="dropdown-content">
                        <a href="#games">Games</a>
                        <a href="#about">About</a>
                        <a href="#contact">Contact</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-overlay-text">
            <h1>Image</h1>
        </div>
    </section>

    <section class="dark-section">
        <h2>Our Games</h2>
    </section>

</body>
</html>
