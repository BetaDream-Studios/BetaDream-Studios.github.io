<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        /* Make the entire background black and remove default margins */
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            font-family: monospace;
        }

        /* Container for the lines at the top */
        .lines-container {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Space between each line */
            max-width: 100%;
        }

        /* Individual line row layout */
        .line-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Label styling */
        .line-label {
            font-size: 14px;
            min-width: 20px;
            user-select: none;
        }

        /* The actual horizontal line */
        .horizontal-line {
            flex-grow: 1;
            height: 1px;
            background-color: #ffffff; /* White line against the black background */
            border: none;
        }
    </style>
</head>
<body>

    <div class="lines-container">
        <div class="line-row">
            <span class="line-label">1</span>
            <hr class="horizontal-line">
        </div>
        
        <div class="line-row">
            <span class="line-label">2</span>
            <hr class="horizontal-line">
        </div>

        <div class="line-row">
            <span class="line-label">3</span>
            <hr class="horizontal-line">
        </div>

        <div class="line-row">
            <span class="line-label">4</span>
            <hr class="horizontal-line">
        </div>

        <div class="line-row">
            <span class="line-label">5</span>
            <hr class="horizontal-line">
        </div>
    </div>

</body>
</html>
