<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        /* Reset all margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Pitch black background */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            padding: 20px;
        }

        /* The actual Navbar at the top */
        .navbar {
            width: 100%;
            height: 60px;
            border: 1px dashed rgba(255, 255, 255, 0.4); /* Clean layout border */
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            margin-bottom: 20px; /* Pushes content below down */
        }

        .nav-logo-placeholder {
            font-weight: 900;
            font-size: 18px;
            letter-spacing: -0.5px;
        }

        .nav-links-placeholder {
            font-weight: 900;
            font-size: 16px;
        }

        /* Next section block blueprint */
        .content-space {
            width: 100%;
            height: 400px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="nav-logo-placeholder">BetaDream</div>
        <div class="nav-links-placeholder">Home ▼</div>
    </nav>

    <div class="content-space">
        NEXT SECTION SPACE
    </div>

</body>
</html>
