<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaDream</title>
    <style>
        /* ==========================================
           RESET & BASE STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', sans-serif;
            background-color: #0d0e12;
            color: #ffffff;
            min-height: 100vh;
        }

        /* ==========================================
           FIXED NAVBAR WITH BACKGROUND BLUR
           ========================================== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 60px;
            z-index: 1000;
            background-color: rgba(255, 255, 255, 0.75); /* Light translucent layer */
            backdrop-filter: blur(12px); /* The background blur effect */
            -webkit-backdrop-filter: blur(12px); /* Safari support */
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            max-width: 1200px;
            height: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-link {
            display: flex;
            align-items: center;
        }

        .nav-logo {
            height: 32px; /* Adjust height based on your layout needs */
            width: auto;
            display: block;
        }

        /* ==========================================
           DROPDOWN MENU STYLE
           ========================================== */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background: none;
            border: none;
            color: #000000; /* Dark text to match your light blur bar */
            font-family: inherit;
            font-size: 16px;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 12px;
        }

        .arrow {
            font-size: 10px;
            transition: transform 0.2s ease;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 160px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 4px;
        }

        .dropdown-content a {
            color: #333333;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .dropdown-content a:hover {
            background-color: #f3f4f6;
        }

        /* Hover Actions */
        .dropdown:hover .dropdown-content {
            display: block;
        }

        .dropdown:hover .arrow {
            transform: rotate(180deg);
        }

        /* ==========================================
           HERO SECTION WITH BACKGROUND IMAGE
           ========================================== */
        .hero-section {
            position: relative;
            width: 100%;
            height: 70vh; /* Takes up 70% of the viewport height */
            margin-top: 60px; /* Prevents fixed navbar from covering the image */
            background-image: url('images/hero-bg.jpg'); /* The landscape asset */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Bold White Center Text Layout */
        .hero-overlay-text h1 {
            font-size: clamp(48px, 10vw, 120px); /* Scales cleanly from mobile to desktop */
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); /* Keeps text highly visible */
            user-select: none;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="/" class="logo-link">
                <img src="images/wordmark.svg" alt="BetaDream Logo" class="nav-logo">
            </a>
            <nav>
                <div class="dropdown">
                    <button class="dropbtn">Home <span class="arrow">▼</span></button>
                    <div class="dropdown-content">
                        <a href="#games">Games</a>
                        <a href="#about">About</a>
                        <a href="#contact">Contact</a>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-overlay-text">
            <h1>Image</h1>
        </div>
    </section>

</body>
</html>
