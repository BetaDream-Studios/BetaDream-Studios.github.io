<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            /* Creates 200% of the viewport height to ensure the page is scrollable */
            min-height: 200vh; 
        }

        .navbar {
            width: 100%;
            height: 60px;
            border-bottom: 1px solid #ffffff;
            /* Keeps the navbar pinned to the top while you scroll */
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        /* Container that takes up the full initial screen height to center the image */
        .center-container {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .center-image {
            max-width: 80%;
            max-height: 70vh;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <nav class="navbar"></nav>

    <div class="center-container">
        <img src="http://googleusercontent.com/image_collection/image_retrieval/6604519198003671211_0" alt="Colorful Image" class="center-image">
    </div>

</body>
</html>
