<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webpage</title>
    <style>
        /* Make the entire background black and remove default margins */
        body {
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            font-family: monospace;
            position: relative;
        }

        /* Container for the numbering track */
        .number-track {
            display: flex;
            flex-direction: column;
            gap: 15px; 
            max-width: 100%;
        }

        /* Label styling for the numbers */
        .line-label {
            font-size: 14px;
            min-width: 20px;
            user-select: none;
            height: 20px;
            display: flex;
            align-items: center;
        }

        /* Header block spanning from the top down to line 2 */
        .header-block {
            position: absolute;
            top: 20px; /* Aligns with body padding */
            left: 60px; /* Pushes it to the right of the numbers */
            right: 20px;
            height: 55px; /* Spans the height covering row 1 down to row 2 */
            background-color: rgba(255, 255, 255, 0.1); /* Translucent white box */
            border: 1px dashed #ffffff;
            display: flex;
            align-items: center;
            padding: 0 15px;
        }

        .header-title {
            margin: 0;
            font-size: 16px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="number-track">
        <div class="line-label">1</div>
        <div class="line-label">2</div>
        <div class="line-label">3</div>
        <div class="line-label">4</div>
        <div class="line-label">5</div>
    </div>

    <header class="header-block">
        <h1 class="header-title">HEADER SPACE</h1>
    </header>

</body>
</html>
